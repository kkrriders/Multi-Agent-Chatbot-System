
services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  mongodb:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Backend agents ──────────────────────────────────────────────────────────
  # All agents use the same image — docker-compose overrides the CMD per service.

  agent-llama3:
    build:
      context: .
      dockerfile: Dockerfile
    command: node src/agents/agent-llama3/index.js
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/multi-agent-chatbot
      REDIS_URL: redis://redis:6379
      OLLAMA_API_BASE: http://host.docker.internal:11434/api
      AGENT_1_PORT: "3005"
    depends_on:
      mongodb: { condition: service_healthy }
      redis:   { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./logs:/app/logs

  agent-mistral:
    build:
      context: .
      dockerfile: Dockerfile
    command: node src/agents/agent-mistral/index.js
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/multi-agent-chatbot
      REDIS_URL: redis://redis:6379
      OLLAMA_API_BASE: http://host.docker.internal:11434/api
      AGENT_2_PORT: "3006"
    depends_on:
      mongodb: { condition: service_healthy }
      redis:   { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3006/status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./logs:/app/logs

  agent-phi3:
    build:
      context: .
      dockerfile: Dockerfile
    command: node src/agents/agent-phi3/index.js
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/multi-agent-chatbot
      REDIS_URL: redis://redis:6379
      OLLAMA_API_BASE: http://host.docker.internal:11434/api
      AGENT_3_PORT: "3007"
    depends_on:
      mongodb: { condition: service_healthy }
      redis:   { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3007/status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./logs:/app/logs

  agent-qwen:
    build:
      context: .
      dockerfile: Dockerfile
    command: node src/agents/agent-qwen/index.js
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/multi-agent-chatbot
      REDIS_URL: redis://redis:6379
      OLLAMA_API_BASE: http://host.docker.internal:11434/api
      AGENT_4_PORT: "3008"
    depends_on:
      mongodb: { condition: service_healthy }
      redis:   { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3008/status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./logs:/app/logs

  manager:
    build:
      context: .
      dockerfile: Dockerfile
    command: node src/agents/manager/index.js
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/multi-agent-chatbot
      REDIS_URL: redis://redis:6379
      OLLAMA_API_BASE: http://host.docker.internal:11434/api
      MANAGER_PORT: "3000"
      FRONTEND_URL: http://localhost:3002
      # Route agent calls to named containers (not localhost)
      AGENT_1_URL: http://agent-llama3:3005
      AGENT_2_URL: http://agent-mistral:3006
      AGENT_3_URL: http://agent-phi3:3007
      AGENT_4_URL: http://agent-qwen:3008
    ports:
      - "3000:3000"
    depends_on:
      mongodb:      { condition: service_healthy }
      redis:        { condition: service_healthy }
      agent-llama3: { condition: service_healthy }
      agent-mistral: { condition: service_healthy }
      agent-phi3:   { condition: service_healthy }
      agent-qwen:   { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    volumes:
      - ./logs:/app/logs

  # ── Frontend ─────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./multi-agent-chatbot
      dockerfile: Dockerfile
      args:
        # Baked into the Next.js client bundle — must be reachable from the browser
        NEXT_PUBLIC_API_URL: http://localhost:3000
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "3002:3002"
    depends_on:
      manager: { condition: service_healthy }

  # ── Optional: Jaeger distributed tracing UI ───────────────────────────────
  # Enable with: docker compose --profile tracing up
  # UI: http://localhost:16686
  # Set OTEL_ENABLED=true in .env to activate tracing in all services.

  jaeger:
    image: jaegertracing/all-in-one:latest
    profiles: ["tracing"]
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "4318:4318"   # OTLP HTTP receiver (backend → Jaeger)
      - "16686:16686" # Jaeger web UI

volumes:
  mongo_data:
  redis_data:
